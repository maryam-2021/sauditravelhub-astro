<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Saudi Travel Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        body {
            background: #050d1a;
            color: #eef3fc;
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            margin: 0;
            overflow: hidden;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
        }
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 8rem;
            margin: 0;
            color: #c9a84c;
            line-height: 1;
        }
        p {
            font-size: 1.2rem;
            color: rgba(220, 232, 255, 0.7);
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #c9a84c, #e8c97a);
            color: #050d1a;
            text-decoration: none;
            padding: 1rem 2rem;
            border-radius: 4px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: opacity 0.3s;
        }
        .btn:hover {
            opacity: 0.85;
        }
        .bg-icon {
            position: absolute;
            font-size: 20rem;
            color: rgba(201, 168, 76, 0.05);
            z-index: -1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div class="bg-icon">404</div>
    <div class="container">
        <h1>404</h1>
        <p>The desert sands have shifted. The page you are looking for has moved or no longer exists.</p>
        <a href="/" class="btn">Return Home</a>
    </div>
</body>
</html>
